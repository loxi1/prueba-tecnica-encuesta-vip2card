services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: vip2cars-app
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      # Ajusta si usas otra zona horaria
      TZ: America/Lima
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: vip2cars-web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mariadb:11.4
    container_name: vip2cars-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vip2cars
      MYSQL_USER: vip2cars
      MYSQL_PASSWORD: vip2cars
      TZ: America/Lima
    ports:
      - "3309:3306"
    volumes:
      - dbdata:/var/lib/mysql

  # Opcional: Vite (Node) para npm run dev/build sin instalar Node local
  node:
    image: node:20-alpine
    container_name: vip2cars-node
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    command: sh -lc "npm install && npm run dev -- --host --port 5173"
    depends_on:
      - app

volumes:
  dbdata:


